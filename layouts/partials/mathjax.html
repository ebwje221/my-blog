<script>
  window.MathJax = {
    tex: {
      // 設定行內公式 (inline) 的分隔符
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      // 設定區塊公式 (block) 的分隔符
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      // 處理像是 \tag{} 這類的標籤
      tags: 'ams'
    },
    options: {
      // 忽略原本就是 HTML 標籤內的內容
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
